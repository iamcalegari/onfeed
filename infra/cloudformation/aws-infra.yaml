AWSTemplateFormatVersion: "2010-09-09"
Description: "onfeed — infra AWS: CloudFront (CDN imagens) + IAM user (Render) + OIDC GitHub (Lambda CI/CD)"

Parameters:
  ImagesS3Bucket:
    Type: String
    Default: "on-feed-recipes-dev"

  GitHubOrg:
    Type: String
    Default: "iamcalegari"

  GitHubRepo:
    Type: String
    Default: "onfeed"

  IngestQueueArn:
    Type: String
    Default: ""
    Description: "ARN da fila SQS de ingestão (deixe vazio se ainda não criou)"

Conditions:
  HasIngestQueue: !Not [!Equals [!Ref IngestQueueArn, ""]]

Resources:

  # ─── CloudFront (CDN para thumbnails) ────────────────────────────────────

  ImagesOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: "onfeed — acesso privado ao bucket de imagens"

  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImagesS3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt ImagesOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ImagesS3Bucket}/*"

  ImagesCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: "onfeed — CDN thumbnails de receitas"
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: s3-images
            DomainName: !Sub "${ImagesS3Bucket}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${ImagesOAI}"
        DefaultCacheBehavior:
          TargetOriginId: s3-images
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true

  # ─── IAM User para o Render ───────────────────────────────────────────────
  # O Render não tem instance role como EC2/App Runner.
  # Este user tem permissões mínimas: S3 (thumbnails) + Bedrock (imagens) + SQS (ingestão).

  RenderApiUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "${AWS::StackName}-render-api"
      Policies:
        - PolicyName: s3-thumbnails
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::${ImagesS3Bucket}"
                  - !Sub "arn:aws:s3:::${ImagesS3Bucket}/*"
        - PolicyName: bedrock-images
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: "*"
        - PolicyName: sqs-ingest
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !If
                  - HasIngestQueue
                  - !Ref IngestQueueArn
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:onfeed-ingest-pipeline-queue"

  # ─── OIDC GitHub (para deploys futuros da Lambda via CI/CD) ──────────────

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
      Policies:
        - PolicyName: lambda-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${ImagesS3Bucket}/lambda/*"
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeChangeSet
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/onfeed-ingest-pipeline/*"
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:onfeed-ingest-pipeline-*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/onfeed-ingest-pipeline-*"

# ─── Outputs ────────────────────────────────────────────────────────────────

Outputs:
  CDNDomain:
    Value: !GetAtt ImagesCDN.DomainName
    Description: "Adicione como IMAGES_CDN_DOMAIN no Render e no .env"

  RenderApiUserName:
    Value: !Ref RenderApiUser
    Description: "IAM user para gerar as credenciais AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY do Render"

  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
    Description: "Adicione como secret AWS_DEPLOY_ROLE_ARN no GitHub (para deploy da Lambda)"
