AWSTemplateFormatVersion: "2010-09-09"
Description: "onfeed — ECR + App Runner + CloudFront (CDN imagens) + IAM"

# Segredos ficam no SSM Parameter Store (SecureString).
# Execute infra/scripts/setup-ssm.sh antes do primeiro deploy.
# Execute infra/scripts/bootstrap.sh para criar a stack + imagem inicial.

Parameters:
  MongoDbName:
    Type: String
    Default: "recipes_on_demand"

  VoyageModel:
    Type: String
    Default: "voyage-3.5"

  VoyageDimensions:
    Type: String
    Default: "1024"

  AnthropicModel:
    Type: String
    Default: "claude-haiku-4-5"

  ImagesS3Bucket:
    Type: String
    Default: "on-feed-recipes-dev"
    Description: "Bucket S3 que já existe para thumbnails"

  # URL do frontend para CORS. Pode ser 'https://onfeed.vercel.app' ou domínio custom.
  FrontendOrigin:
    Type: String
    Default: "https://onfeed.vercel.app"

  # ARN da fila SQS criada pelo stack 'onfeed-ingest-pipeline'.
  # Deixe vazio se ainda não criou o pipeline de ingestão.
  IngestQueueArn:
    Type: String
    Default: ""

  # Username/org do GitHub para o OIDC (sem @)
  GitHubOrg:
    Type: String
    Default: "iamcalegari"

  GitHubRepo:
    Type: String
    Default: "onfeed"

  # Segredos (NoEcho = nunca aparecem nos logs/console do CloudFormation).
  # O bootstrap script os lê do SSM e os passa aqui. App Runner não suporta
  # {{resolve:ssm-secure:...}} em variáveis de ambiente via CloudFormation.
  MongodbUri:
    Type: String
    NoEcho: true
  MongodbUsername:
    Type: String
    NoEcho: true
  MongodbPassword:
    Type: String
    NoEcho: true
  VoyageApiKey:
    Type: String
    NoEcho: true
  AnthropicApiKey:
    Type: String
    NoEcho: true
  ClerkSecretKey:
    Type: String
    NoEcho: true
  ClerkPublishableKey:
    Type: String
    NoEcho: true

Conditions:
  HasIngestQueue: !Not [!Equals [!Ref IngestQueueArn, ""]]

Resources:

  # ─── ECR ──────────────────────────────────────────────────────────────────

  ApiECRRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: onfeed/api
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Mantém apenas as últimas 10 imagens",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  # ─── CloudFront (CDN para thumbnails do S3) ────────────────────────────────

  ImagesCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: "onfeed — CDN thumbnails de receitas"
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # apenas US/EU/Asia — mais barato
        Origins:
          - Id: s3-images
            DomainName: !Sub "${ImagesS3Bucket}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${ImagesOAI}"
        DefaultCacheBehavior:
          TargetOriginId: s3-images
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (managed)
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true

  ImagesOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: "onfeed — acesso privado ao bucket de imagens"

  # Permite que o CloudFront leia o bucket S3 sem torná-lo público
  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImagesS3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt ImagesOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ImagesS3Bucket}/*"

  # ─── IAM — GitHub Actions OIDC ────────────────────────────────────────────

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea

  # Role que o GitHub Actions assume via OIDC (sem credenciais estáticas)
  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                # Permite apenas pushes para a branch main do repo correto
                "token.actions.githubusercontent.com:sub":
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
      Policies:
        - PolicyName: ecr-push
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !GetAtt ApiECRRepository.Arn
        - PolicyName: apprunner-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - apprunner:StartDeployment
                  - apprunner:DescribeService
                Resource: !GetAtt ApiAppRunnerService.ServiceArn

  # ─── IAM — App Runner ─────────────────────────────────────────────────────

  # Permite que o App Runner faça pull de imagens do ECR
  AppRunnerECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ecr-access"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  # Role da instância — o que a API pode fazer dentro da AWS
  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-instance"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: s3-thumbnails
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::${ImagesS3Bucket}"
                  - !Sub "arn:aws:s3:::${ImagesS3Bucket}/*"
        - PolicyName: bedrock-images
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: "*"
        - PolicyName: sqs-ingest
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !If
                  - HasIngestQueue
                  - !Ref IngestQueueArn
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:onfeed-ingest-pipeline-queue"

  # ─── App Runner ───────────────────────────────────────────────────────────

  ApiAutoScaling:
    Type: AWS::AppRunner::AutoScalingConfiguration
    Properties:
      AutoScalingConfigurationName: !Sub "${AWS::StackName}-api"
      # MinSize: 0 = scale-to-zero quando idle (cold start ~5-15s na primeira req)
      # Para produção com tráfego constante, suba para 1.
      MinSize: 0
      MaxSize: 5
      MaxConcurrency: 80

  ApiAppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub "${AWS::StackName}-api"
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerECRAccessRole.Arn
        ImageRepository:
          ImageRepositoryType: ECR
          ImageIdentifier: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/onfeed/api:latest"
          ImageConfiguration:
            Port: "3000"
            RuntimeEnvironmentVariables:
              NODE_ENV: production
              MONGODB_DB_NAME: !Ref MongoDbName
              VOYAGE_MODEL: !Ref VoyageModel
              VOYAGE_DIMENSIONS: !Ref VoyageDimensions
              ANTHROPIC_MODEL: !Ref AnthropicModel
              IMAGES_S3_BUCKET: !Ref ImagesS3Bucket
              IMAGES_CDN_DOMAIN: !GetAtt ImagesCDN.DomainName
              BEDROCK_REGION: us-west-2
              BEDROCK_IMAGE_MODEL: stability.stable-image-core-v1:1
              FRONTEND_ORIGIN: !Ref FrontendOrigin
              MONGODB_URI: !Ref MongodbUri
              MONGODB_USERNAME: !Ref MongodbUsername
              MONGODB_PASSWORD: !Ref MongodbPassword
              VOYAGE_API_KEY: !Ref VoyageApiKey
              ANTHROPIC_API_KEY: !Ref AnthropicApiKey
              CLERK_SECRET_KEY: !Ref ClerkSecretKey
              CLERK_PUBLISHABLE_KEY: !Ref ClerkPublishableKey
        AutoDeploymentsEnabled: false  # CI/CD gerencia os deploys
      InstanceConfiguration:
        Cpu: "0.25 vCPU"
        Memory: "0.5 GB"
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5
      AutoScalingConfigurationArn: !GetAtt ApiAutoScaling.AutoScalingConfigurationArn

# ─── Outputs ────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Value: !Sub "https://${ApiAppRunnerService.ServiceUrl}"
    Description: "URL da API — use como API_BASE_URL no Vercel"

  ECRRepository:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/onfeed/api"
    Description: "Endpoint ECR para build/push da imagem"

  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
    Description: "Adicione como secret AWS_DEPLOY_ROLE_ARN no GitHub"

  AppRunnerServiceArn:
    Value: !GetAtt ApiAppRunnerService.ServiceArn
    Description: "Adicione como secret APP_RUNNER_API_SERVICE_ARN no GitHub"

  CDNDomain:
    Value: !GetAtt ImagesCDN.DomainName
    Description: "Domínio CloudFront para thumbnails (IMAGES_CDN_DOMAIN)"
